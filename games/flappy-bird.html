<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Flappy Bird</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(145deg, #0a2f3f 0%, #0a1a2a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', 'VT323', monospace;
        }

        .game-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        canvas {
            display: block;
            border-radius: 16px;
            box-shadow: 0 0 0 8px #ffd966, 0 0 0 12px #b45f2b;
            cursor: pointer;
        }

        .ui-overlay {
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 0 30px;
            pointer-events: none;
        }

        .score-box, .best-box {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 28px;
            font-weight: bold;
            color: #f7f3e0;
            text-shadow: 2px 2px 0 #2c5a2e;
            letter-spacing: 2px;
            font-family: monospace;
        }

        .score-box span, .best-box span {
            font-size: 18px;
            margin-right: 8px;
            color: #ffd966;
        }

        .start-message {
            position: absolute;
            bottom: 30%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            padding: 12px 24px;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            font-size: 20px;
            white-space: nowrap;
            pointer-events: none;
            animation: pulse 1.2s infinite;
            font-family: monospace;
            border: 1px solid #ffd966;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; transform: translateX(-50%) scale(0.95); }
            50% { opacity: 1; transform: translateX(-50%) scale(1.05); }
        }

        @media (max-width: 550px) {
            .score-box, .best-box { padding: 4px 14px; font-size: 20px; }
            .score-box span, .best-box span { font-size: 14px; }
            .start-message { font-size: 16px; white-space: nowrap; bottom: 25%; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    <div class="ui-overlay">
        <div class="score-box"><span>SCORE</span> <span id="scoreValue">0</span></div>
        <div class="best-box"><span>BEST</span> <span id="bestValue">0</span></div>
    </div>
    <div id="startMessage" class="start-message">JUMP TO START</div>
</div>

<script>
    (function(){
        // ----- CANVAS -----
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // ----- GAME STATE -----
        let gameRunning = false;    // true saat game aktif
        let score = 0;
        let bestScore = localStorage.getItem('flappyBest') ? parseInt(localStorage.getItem('flappyBest')) : 0;
        document.getElementById('bestValue').innerText = bestScore;

        // ----- BIRD -----
        const bird = {
            x: 80,
            y: canvas.height/2,
            radius: 14,
            velocity: 0,
            gravity: 0.25,
            jumpPower: -5.2
        };

        // ----- PIPES -----
        let pipes = [];
        const pipeWidth = 65;
        const pipeGap = 150;
        const pipeSpacing = 240;
        let frameCounter = 0;

        // ----- GROUND & SCROLL -----
        let groundX = 0;
        const groundHeight = 80;
        const groundSpeed = 2.2;

        // ----- BACKGROUND CLOUDS -----
        let clouds = [
            { x: 100, y: 80, size: 40 },
            { x: 280, y: 150, size: 55 },
            { x: 30, y: 220, size: 45 },
            { x: 320, y: 320, size: 50 }
        ];

        // ----- FUNGSI UTAMA -----
        function resetGame() {
            gameRunning = true;
            score = 0;
            document.getElementById('scoreValue').innerText = score;
            bird.y = canvas.height/2;
            bird.velocity = 0;
            pipes = [];
            frameCounter = 0;
            groundX = 0;
            // sembunyikan pesan start
            const msg = document.getElementById('startMessage');
            if(msg) msg.style.display = 'none';
        }

        function gameOver() {
            gameRunning = false;
            // update best score
            if(score > bestScore) {
                bestScore = score;
                localStorage.setItem('flappyBest', bestScore);
                document.getElementById('bestValue').innerText = bestScore;
            }
            const msg = document.getElementById('startMessage');
            if(msg) {
                msg.style.display = 'block';
                msg.innerText = 'GAME OVER - TAP / SPACE';
            }
        }

        // menambah pipa baru
        function addPipe() {
            const minTop = 70;
            const maxTop = canvas.height - groundHeight - pipeGap - 70;
            const topHeight = Math.floor(Math.random() * (maxTop - minTop + 1) + minTop);
            pipes.push({
                x: canvas.width,
                topHeight: topHeight,
                counted: false
            });
        }

        // update posisi, fisika, collision
        function updateGame() {
            if(!gameRunning) return;

            // 1. BIRD PHYSICS
            bird.velocity += bird.gravity;
            bird.y += bird.velocity;

            // batas atas / bawah
            if(bird.y - bird.radius <= 0) {
                bird.y = bird.radius;
                bird.velocity = 0;
                // bisa langsung game over jika terlalu over
                if(gameRunning) gameOver();
            }
            if(bird.y + bird.radius >= canvas.height - groundHeight) {
                if(gameRunning) gameOver();
            }

            // 2. PIPES LOGIC
            // spawn pipe setiap 90 frame (~ 1.5 detik jika 60fps)
            if(frameCounter % 90 === 0) {
                addPipe();
            }

            // update posisi pipes & collision + score
            for(let i = 0; i < pipes.length; i++) {
                const p = pipes[i];
                p.x -= groundSpeed;

                // collision detection (rect-circle)
                const birdLeft = bird.x - bird.radius;
                const birdRight = bird.x + bird.radius;
                const birdTop = bird.y - bird.radius;
                const birdBottom = bird.y + bird.radius;

                // pipe top rect
                const pipeTopRightX = p.x + pipeWidth;
                const pipeTopRect = { x: p.x, y: 0, w: pipeWidth, h: p.topHeight };
                // pipe bottom rect
                const bottomPipeY = p.topHeight + pipeGap;
                const pipeBottomRect = { x: p.x, y: bottomPipeY, w: pipeWidth, h: canvas.height - groundHeight - bottomPipeY };

                // cek tabrakan
                if( (birdRight > pipeTopRect.x && birdLeft < pipeTopRect.x + pipeWidth &&
                     birdBottom > pipeTopRect.y && birdTop < pipeTopRect.h) ||
                    (birdRight > pipeBottomRect.x && birdLeft < pipeBottomRect.x + pipeWidth &&
                     birdBottom > pipeBottomRect.y && birdTop < pipeBottomRect.y + pipeBottomRect.h) ) {
                    gameOver();
                }

                // score jika berhasil melewati pipa
                if(!p.counted && p.x + pipeWidth < bird.x - bird.radius) {
                    p.counted = true;
                    score++;
                    document.getElementById('scoreValue').innerText = score;
                    // tambah efek suara (opsional, bisa diabaikan)
                }
            }

            // hapus pipa di luar canvas
            pipes = pipes.filter(p => p.x + pipeWidth > 0);

            // ground scroll
            groundX = (groundX - groundSpeed) % 60;

            frameCounter++;
        }

        // ----- DRAW SEMUA ELEMEN -----
        function drawBackground() {
            // sky gradasi
            const gradSky = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradSky.addColorStop(0, "#4bb3e3");
            gradSky.addColorStop(0.7, "#87CEEB");
            gradSky.addColorStop(1, "#c0e0ff");
            ctx.fillStyle = gradSky;
            ctx.fillRect(0, 0, canvas.width, canvas.height - groundHeight);

            // awan
            ctx.fillStyle = "rgba(255,255,245,0.9)";
            clouds.forEach(c => {
                ctx.beginPath();
                ctx.ellipse(c.x, c.y, c.size, c.size*0.7, 0, 0, Math.PI*2);
                ctx.ellipse(c.x + c.size*0.5, c.y - c.size*0.3, c.size*0.6, c.size*0.5, 0, 0, Math.PI*2);
                ctx.ellipse(c.x - c.size*0.4, c.y - c.size*0.2, c.size*0.55, c.size*0.5, 0, 0, Math.PI*2);
                ctx.fill();
            });
        }

        function drawPipes() {
            for(let p of pipes) {
                // pipe atas
                ctx.fillStyle = "#2d6a2f";
                ctx.shadowBlur = 0;
                ctx.fillRect(p.x, 0, pipeWidth, p.topHeight);
                // detail atas
                ctx.fillStyle = "#1e4a1f";
                ctx.fillRect(p.x - 8, p.topHeight - 30, pipeWidth+16, 35);
                ctx.fillStyle = "#f4c542";
                ctx.fillRect(p.x - 4, p.topHeight - 28, pipeWidth+8, 12);
                // pipe bawah
                const bottomY = p.topHeight + pipeGap;
                const bottomHeight = canvas.height - groundHeight - bottomY;
                ctx.fillStyle = "#2d6a2f";
                ctx.fillRect(p.x, bottomY, pipeWidth, bottomHeight);
                ctx.fillStyle = "#1e4a1f";
                ctx.fillRect(p.x - 8, bottomY, pipeWidth+16, 35);
                ctx.fillStyle = "#f4c542";
                ctx.fillRect(p.x - 4, bottomY+8, pipeWidth+8, 12);
            }
        }

        function drawBird() {
            // efek bulu burung
            ctx.save();
            ctx.shadowBlur = 0;
            // badan utama
            ctx.fillStyle = "#f5d742";
            ctx.beginPath();
            ctx.arc(bird.x, bird.y, bird.radius, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "#e0b82b";
            ctx.beginPath();
            ctx.ellipse(bird.x-2, bird.y-2, 4, 5, 0, 0, Math.PI*2);
            ctx.fill();
            // mata
            ctx.fillStyle = "#000";
            ctx.beginPath();
            ctx.arc(bird.x+4, bird.y-3, 2.5, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "white";
            ctx.beginPath();
            ctx.arc(bird.x+5, bird.y-4, 1, 0, Math.PI*2);
            ctx.fill();
            // paruh
            ctx.fillStyle = "#d9470a";
            ctx.beginPath();
            ctx.moveTo(bird.x+10, bird.y-2);
            ctx.lineTo(bird.x+18, bird.y);
            ctx.lineTo(bird.x+10, bird.y+2);
            ctx.fill();
            // jambul
            ctx.fillStyle = "#e06c1a";
            ctx.beginPath();
            ctx.moveTo(bird.x-8, bird.y-8);
            ctx.lineTo(bird.x-2, bird.y-12);
            ctx.lineTo(bird.x, bird.y-5);
            ctx.fill();
            ctx.restore();
        }

        function drawGround() {
            ctx.fillStyle = "#a5652b";
            ctx.fillRect(0, canvas.height - groundHeight, canvas.width, groundHeight);
            ctx.fillStyle = "#c9863a";
            for(let i = 0; i < 20; i++) {
                ctx.fillRect((groundX + i*60) % canvas.width, canvas.height - groundHeight + 12, 35, 12);
            }
            ctx.fillStyle = "#5e3a1c";
            ctx.fillRect(0, canvas.height - groundHeight+4, canvas.width, 8);
            // rumput
            ctx.fillStyle = "#5f8b3e";
            for(let i=0;i<12;i++) {
                ctx.fillRect(i*45 + groundX%45, canvas.height - groundHeight-4, 5, 8);
            }
        }

        function drawScoreOnCanvas() {
            if(!gameRunning && score > 0) {
                ctx.font = "bold 32px 'Courier New'";
                ctx.fillStyle = "#2c2c2c";
                ctx.shadowBlur = 0;
                ctx.fillText("GAME OVER", canvas.width/2-100, canvas.height/2-70);
            }
        }

        function animate() {
            updateGame();
            // DRAW
            drawBackground();
            drawPipes();
            drawBird();
            drawGround();
            drawScoreOnCanvas();

            // efek bayangan burung saat game over tidak mengganggu
            requestAnimationFrame(animate);
        }

        // ----- JUMP / START -----
        function handleJump(e) {
            // mencegah scroll saat spasi
            if(e.type === 'keydown') {
                if(e.code === 'Space' || e.code === 'ArrowUp') {
                    e.preventDefault();
                }
            }
            // jika game tidak berjalan -> mulai ulang
            if(!gameRunning) {
                resetGame();
                return;
            }
            // jika game sedang berjalan -> loncat
            bird.velocity = bird.jumpPower;
            // efek sedikit agar lebih responsif
            if(bird.y - bird.radius < 5) bird.velocity = -3;
        }

        // Event listeners
        canvas.addEventListener('click', (e) => {
            e.preventDefault();
            handleJump(e);
        });
        window.addEventListener('keydown', handleJump);
        // untuk sentuh di mobile
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleJump(e);
        });

        // Inisialisasi tampilan idle, game belum running, tampilkan pesan
        // Tapi biarkan bird menggambar di tengah, pipes tidak aktif
        function idleDraw() {
            if(!gameRunning) {
                drawBackground();
                // gambar pipa diam (optional, tidak ada pipe saat idle)
                drawBird();
                drawGround();
                ctx.font = "bold 18px monospace";
                ctx.fillStyle = "#fff5e0";
                ctx.shadowBlur = 0;
                ctx.fillText("TAP / SPACE", canvas.width/2-70, canvas.height-120);
            }
            requestAnimationFrame(idleDraw);
        }

        // Override reset agar pipes dikosongkan dan bird posisi awal
        const originalReset = resetGame;
        window.resetGame = resetGame;
        resetGame = function() {
            originalReset();
            pipes = [];
            frameCounter = 0;
            bird.y = canvas.height/2;
            bird.velocity = 0;
            score = 0;
            document.getElementById('scoreValue').innerText = score;
            gameRunning = true;
            if(document.getElementById('startMessage')) document.getElementById('startMessage').style.display = 'none';
        };

        // fix conflict
        window.resetGame = resetGame;
        // Mulai animasi
        resetGame = function() {
            gameRunning = true;
            score = 0;
            document.getElementById('scoreValue').innerText = score;
            bird.y = canvas.height/2;
            bird.velocity = 0;
            pipes = [];
            frameCounter = 0;
            groundX = 0;
            const msg = document.getElementById('startMessage');
            if(msg) msg.style.display = 'none';
        };
        // untuk memulai pertama kali dengan state belum main (supaya JUMP TO START)
        gameRunning = false;
        document.getElementById('startMessage').style.display = 'block';
        // gambar idle + jalankan animasi utama yang akan updateGame hanya jika gameRunning
        animate(); // animate akan menjalankan updateGame & draw, updateGame cek gameRunning
        // update best tampilan awal
        document.getElementById('bestValue').innerText = bestScore;

        // tambahan: perbaiki start ulang setelah game over
        const originalGameOver = gameOver;
        window.gameOver = gameOver;
        gameOver = function() {
            if(gameRunning === true) {
                gameRunning = false;
                if(score > bestScore) {
                    bestScore = score;
                    localStorage.setItem('flappyBest', bestScore);
                    document.getElementById('bestValue').innerText = bestScore;
                }
                const msg = document.getElementById('startMessage');
                if(msg) {
                    msg.style.display = 'block';
                    msg.innerText = 'GAME OVER - TAP / SPACE';
                }
            }
        };
        window.gameOver = gameOver;
        // patch function supaya handleJump mereset
        const superJump = handleJump;
        window.handleJump = handleJump;
        handleJump = function(e) {
            if(!gameRunning) {
                // reset manual
                gameRunning = true;
                score = 0;
                document.getElementById('scoreValue').innerText = score;
                bird.y = canvas.height/2;
                bird.velocity = 0;
                pipes = [];
                frameCounter = 0;
                groundX = 0;
                const msg = document.getElementById('startMessage');
                if(msg) msg.style.display = 'none';
                if(e && e.preventDefault) e.preventDefault();
                return;
            }
            if(gameRunning) {
                bird.velocity = bird.jumpPower;
                if(e && e.preventDefault) e.preventDefault();
            }
        };
        // replace event lagi
        canvas.removeEventListener('click', handleJump);
        window.removeEventListener('keydown', handleJump);
        canvas.addEventListener('click', handleJump);
        window.addEventListener('keydown', handleJump);
        canvas.addEventListener('touchstart', handleJump);
    })();
</script>
</body>
</html>
