<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Instagram Downloader v1</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, 'Segoe UI', sans-serif; }
        body {
            background: linear-gradient(145deg, #0f0c1f 0%, #1a1b2f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }
        .card {
            max-width: 800px;
            width: 100%;
            background: rgba(15, 20, 35, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            padding: 1.8rem;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.15);
        }
        h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #feda77, #d62976, #962fbf);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }
        .sub {
            color: #a0a3c0;
            margin-bottom: 2rem;
            border-left: 3px solid #f56040;
            padding-left: 1rem;
            font-size: 0.9rem;
        }
        .input-group {
            margin-bottom: 1.8rem;
        }
        label {
            display: block;
            font-weight: 500;
            color: #e2e8f0;
            margin-bottom: 0.6rem;
        }
        input {
            width: 100%;
            background: #0a0c1a;
            border: 1px solid #2d2f4e;
            border-radius: 1rem;
            padding: 0.9rem 1.2rem;
            color: #f1f5f9;
            font-size: 0.95rem;
            outline: none;
        }
        input:focus {
            border-color: #e1306c;
            box-shadow: 0 0 0 3px rgba(225, 48, 108, 0.25);
        }
        .btn {
            background: linear-gradient(95deg, #f56040, #e1306c);
            border: none;
            padding: 0.85rem 1.8rem;
            border-radius: 2rem;
            font-weight: 600;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            text-align: center;
            display: inline-block;
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .result-area {
            margin-top: 2rem;
            background: #0b0e1a;
            border-radius: 1.5rem;
            padding: 1.2rem;
            border: 1px solid #2a2d4a;
        }
        .preview-container {
            margin-bottom: 1.2rem;
            border-radius: 1rem;
            overflow: hidden;
            background: #000;
            text-align: center;
        }
        video, img {
            max-width: 100%;
            max-height: 400px;
            border-radius: 0.8rem;
        }
        .meta-info {
            background: #0f1222;
            padding: 1rem;
            border-radius: 1rem;
            margin: 1rem 0;
            color: #cbd5e1;
            word-break: break-word;
            overflow-wrap: break-word;
        }
        .meta-info p {
            margin: 0.4rem 0;
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
        }
        .meta-info strong {
            color: #f5a65b;
            min-width: 80px;
        }
        .download-btn {
            background: linear-gradient(95deg, #2b9348, #55a630);
            margin-top: 0.5rem;
        }
        .loading, .error {
            text-align: center;
            padding: 1rem;
        }
        .loading { color: #f5a65b; }
        .error { color: #ff8a7a; background: rgba(255, 70, 70, 0.1); border-radius: 1rem; }
        .key-status, .footer-note {
            text-align: center;
            font-size: 0.7rem;
            color: #9ca3af;
            margin-top: 0.5rem;
        }
        .manual-key-form {
            background: #0f1222;
            border-radius: 1rem;
            padding: 1rem;
            margin-top: 1rem;
            text-align: center;
            border: 1px dashed #e1306c;
        }
        .manual-key-form input {
            background: #0a0c1a;
            margin-bottom: 0.5rem;
            width: 100%;
        }
        .manual-key-form button {
            background: #2d2f4e;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            border: none;
            color: white;
            cursor: pointer;
            margin: 0.2rem;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>🖇️ Instagram Downloader v1</h1>
    <div class="sub">Download video, foto, reel — cukup tempel link Instagram</div>

    <div class="input-group">
        <label>🔗 Link Instagram (post/reel/story)</label>
        <input type="text" id="urlInput" placeholder="https://www.instagram.com/reel/...">
    </div>

    <button id="downloadBtn" class="btn">✨ Download Media</button>
    <div id="keyStatus" class="key-status">🔑 Memuat kunci...</div>
    <div id="result" class="result-area" style="display: none;"></div>
    <div class="footer-note">🚀 Instagram Downloader | Jika ada kesalahan ambil data silahkan ulangi lagi</div>
</div>

<script>
    // ========== KUNCI DEFAULT (BASE64) ==========
    const DEFAULT_BASE64 = "ZmR2XzNneUlOaGxVd21qYWdiMjlORXVZZw==";
    let apiKey = localStorage.getItem('ig_api_key'); // cek kunci tersimpan

    const BASE_URL = "https://api.ferdev.my.id/downloader/instagram";
    const urlInput = document.getElementById('urlInput');
    const downloadBtn = document.getElementById('downloadBtn');
    const keyStatus = document.getElementById('keyStatus');
    const resultDiv = document.getElementById('result');

    // Fungsi decode base64
    function decodeBase64(str) {
        try { return atob(str); } catch(e) { return null; }
    }

    // Inisialisasi kunci: jika belum ada di localStorage, gunakan default
    if (!apiKey) {
        const defaultKey = decodeBase64(DEFAULT_BASE64);
        if (defaultKey) {
            apiKey = defaultKey;
            localStorage.setItem('ig_api_key', apiKey);
            keyStatus.innerHTML = '🔑 Kunci API siap (default)';
        } else {
            keyStatus.innerHTML = '❌ Kunci default rusak. Masukkan manual.';
            showManualInput();
        }
    } else {
        keyStatus.innerHTML = '✅ Apikey Aktif';
    }

    // Tampilkan form input manual
    function showManualInput(message = '') {
        const existing = document.querySelector('.manual-key-form');
        if (existing) existing.remove();
        const formDiv = document.createElement('div');
        formDiv.className = 'manual-key-form';
        formDiv.innerHTML = `
            <p>${message || '🔑 API Key tidak valid atau belum tersedia. Masukkan kunci baru:'}</p>
            <input type="text" id="newKeyInput" placeholder="Kunci plain atau base64...">
            <button id="saveKeyBtn">💾 Simpan & Gunakan</button>
            <button id="cancelKeyBtn">✖ Batal</button>
        `;
        document.querySelector('.card').appendChild(formDiv);
        document.getElementById('saveKeyBtn').onclick = () => {
            let val = document.getElementById('newKeyInput').value.trim();
            if (!val) return;
            let decoded = decodeBase64(val);
            if (!decoded) decoded = val; // anggap plain
            if (decoded) {
                apiKey = decoded;
                localStorage.setItem('ig_api_key', apiKey);
                keyStatus.innerHTML = '✅ Kunci API diperbarui (manual)';
                formDiv.remove();
                downloadBtn.disabled = false;
                // Opsional: coba ulang request jika ada URL
                if (urlInput.value.trim()) fetchInstagram();
            } else {
                alert('Format kunci tidak valid');
            }
        };
        document.getElementById('cancelKeyBtn').onclick = () => formDiv.remove();
        downloadBtn.disabled = true;
    }

    // Tampilkan hasil (loading/error/preview)
    function showResult(html, isError = false) {
        resultDiv.style.display = 'block';
        resultDiv.innerHTML = html;
    }

    // Fungsi untuk mengunduh media dengan blob (agar download atribut berfungsi lintas origin)
    async function downloadMedia(url, filename) {
        try {
            const response = await fetch(url, { mode: 'cors' });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const blob = await response.blob();
            const blobUrl = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = blobUrl;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(blobUrl);
        } catch (err) {
            console.error('Download gagal:', err);
            alert('Gagal mengunduh media. Coba klik kanan dan "Save link as" pada preview.');
            // fallback: buka di tab baru
            window.open(url, '_blank');
        }
    }

    async function fetchInstagram() {
        const url = urlInput.value.trim();
        if (!url) return alert('Masukkan link Instagram!');
        if (!url.includes('instagram.com')) return showResult('<div class="error">⚠️ Link harus dari instagram.com</div>', true);
        if (!apiKey) {
            showManualInput('Kunci API belum ada. Silakan masukkan:');
            return;
        }

        showResult('<div class="loading">⏳ Mengambil data...</div>');
        try {
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), 30000);
            const res = await fetch(`${BASE_URL}?link=${encodeURIComponent(url)}&apikey=${apiKey}`, {
                signal: controller.signal,
                referrerPolicy: 'no-referrer'
            });
            clearTimeout(timeout);
            const json = await res.json();

            // Tangani error dari API
            if (!res.ok || !json.success) {
                const errMsg = json.message || json.error || 'Gagal mengambil data';
                if (errMsg.toLowerCase().includes('api key tidak valid')) {
                    // Hapus kunci yang tidak valid dari localStorage
                    localStorage.removeItem('ig_api_key');
                    apiKey = null;
                    showManualInput('⚠️ Kunci API tidak valid. Masukkan kunci baru:');
                    showResult(`<div class="error">⚠️ ${errMsg}</div>`, true);
                    return;
                }
                throw new Error(errMsg);
            }

            if (!json.data?.dlink) throw new Error('Tidak ada tautan download.');

            const data = json.data;
            const isVideo = data.type === 'mp4';
            const mediaUrl = data.dlink;
            const mediaHtml = isVideo ? 
                `<video controls autoplay muted playsinline><source src="${mediaUrl}" type="video/mp4"></video>` :
                `<img src="${mediaUrl}" alt="preview">`;
            const meta = data.metadata || {};
            const username = meta.username || 'instagram';
            const extension = isVideo ? 'mp4' : 'jpg';
            const filename = `${username}_${Date.now()}.${extension}`;

            // Tampilkan hasil dengan tombol download yang memanggil fungsi downloadMedia
            showResult(`
                <div class="preview-container">${mediaHtml}</div>
                <div class="meta-info">
                    <p><strong>👤 Username:</strong> ${escapeHtml(username)}</p>
                    <p><strong>📝 Caption:</strong> ${escapeHtml(meta.title || 'Tidak ada')}</p>
                    <p><strong>❤️ Like:</strong> ${meta.likeCount || 0} &nbsp;|&nbsp; 💬 Komentar: ${meta.commentCount || 0}</p>
                    <p><strong>📁 Tipe:</strong> ${isVideo ? 'Video' : 'Foto'}</p>
                </div>
                <button id="downloadMediaBtn" class="btn download-btn">⬇️ Download Media</button>
            `);

            // Pasang event listener untuk tombol download yang baru dibuat
            document.getElementById('downloadMediaBtn').addEventListener('click', () => {
                downloadMedia(mediaUrl, filename);
            });

        } catch (err) {
            console.error(err);
            let msg = err.message;
            if (err.name === 'AbortError') msg = '⏱️ Timeout. Coba lagi.';
            if (msg.includes('Failed to fetch')) msg = '🌐 Gagal koneksi ke server.';
            showResult(`<div class="error">⚠️ ${escapeHtml(msg)}</div>`, true);
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }

    downloadBtn.addEventListener('click', fetchInstagram);
    urlInput.addEventListener('keypress', e => e.key === 'Enter' && fetchInstagram());

    // Jika kunci default sudah benar, tombol aktif. Jika belum, tombol dinonaktifkan oleh showManualInput.
    if (apiKey) downloadBtn.disabled = false;
</script>
</body>
</html>
