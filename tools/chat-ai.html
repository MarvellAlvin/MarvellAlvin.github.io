<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Chat AI 1.0 - Multi Model</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Roboto', sans-serif;
        }
        body {
            background: linear-gradient(145deg, #0f0c1f 0%, #1a1b2f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }
        .card {
            max-width: 900px;
            width: 100%;
            background: rgba(15, 20, 35, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            padding: 1.8rem;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.15);
        }
        h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #4285f4, #ea4335, #fbbc04, #34a853);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .sub {
            color: #a0a3c0;
            margin-bottom: 2rem;
            border-left: 3px solid #4285f4;
            padding-left: 1rem;
            font-size: 0.9rem;
        }
        .ai-selector {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 1.8rem;
            background: #0a0c1a;
            padding: 1rem;
            border-radius: 1.5rem;
        }
        .ai-option {
            flex: 1;
            text-align: center;
        }
        .ai-option input {
            display: none;
        }
        .ai-option label {
            display: block;
            padding: 0.75rem 1rem;
            background: #1e1f2e;
            border-radius: 2rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid #2d2f4e;
            color: #cbd5e1;
        }
        .ai-option input:checked + label {
            background: linear-gradient(95deg, #4285f4, #8f4ef0);
            color: white;
            border-color: transparent;
            box-shadow: 0 0 10px rgba(66,133,244,0.3);
        }
        .ai-option label:hover {
            background: #2d2f4e;
        }
        .input-group {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            font-weight: 500;
            color: #e2e8f0;
            margin-bottom: 0.6rem;
        }
        textarea {
            width: 100%;
            background: #0a0c1a;
            border: 1px solid #2d2f4e;
            border-radius: 1rem;
            padding: 0.9rem 1.2rem;
            color: #f1f5f9;
            font-size: 0.95rem;
            outline: none;
            resize: vertical;
            font-family: inherit;
        }
        textarea:focus {
            border-color: #4285f4;
            box-shadow: 0 0 0 3px rgba(66,133,244,0.25);
        }
        .btn {
            background: linear-gradient(95deg, #4285f4, #8f4ef0);
            border: none;
            padding: 0.85rem 1.8rem;
            border-radius: 2rem;
            font-weight: 600;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            text-align: center;
            display: inline-block;
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .btn:hover:not(:disabled) {
            transform: scale(1.01);
            filter: brightness(1.05);
        }
        .result-area {
            margin-top: 2rem;
            background: #0b0e1a;
            border-radius: 1.5rem;
            padding: 1.2rem;
            border: 1px solid #2a2d4a;
        }
        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #2a2d4a;
        }
        .result-header span {
            font-weight: 600;
            color: #f5a65b;
        }
        .result-content {
            color: #e2e8f0;
            line-height: 1.6;
            word-break: break-word;
        }
        .result-content h1, .result-content h2, .result-content h3 {
            margin-top: 1.2em;
            margin-bottom: 0.6em;
            font-weight: 600;
            color: #f5a65b;
        }
        .result-content h1 { font-size: 1.8rem; border-left: 4px solid #f5a65b; padding-left: 0.8rem; }
        .result-content h2 { font-size: 1.5rem; border-left: 3px solid #f5a65b; padding-left: 0.8rem; }
        .result-content h3 { font-size: 1.2rem; }
        .result-content p {
            margin: 0.8em 0;
        }
        .result-content ul, .result-content ol {
            margin: 0.5em 0 0.5em 1.8em;
        }
        .result-content li {
            margin: 0.3em 0;
        }
        .result-content strong {
            color: #ffd966;
            font-weight: 600;
        }
        .result-content em {
            font-style: italic;
            color: #b0b3d0;
        }
        .result-content hr {
            margin: 1.2em 0;
            border: 0;
            height: 1px;
            background: #2a2d4a;
        }
        .result-content a {
            color: #6c9eff;
            text-decoration: none;
            border-bottom: 1px dotted #6c9eff;
        }
        .result-content a:hover {
            text-decoration: underline;
        }
        .result-content blockquote {
            border-left: 3px solid #4285f4;
            padding-left: 1rem;
            margin: 1rem 0;
            color: #b0b3d0;
            font-style: italic;
        }
        .result-content code {
            background: #1e1f2e;
            padding: 0.2rem 0.4rem;
            border-radius: 0.3rem;
            font-family: monospace;
            font-size: 0.9em;
        }
        .result-content pre {
            background: #1e1f2e;
            padding: 1rem;
            border-radius: 0.8rem;
            overflow-x: auto;
            margin: 1rem 0;
        }
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            padding: 2rem;
            color: #f5a65b;
        }
        .error {
            color: #ff8a7a;
            background: rgba(255, 70, 70, 0.1);
            padding: 1rem;
            border-radius: 1rem;
            border-left: 4px solid #ff5e57;
        }
        .key-status {
            text-align: center;
            font-size: 0.7rem;
            color: #9ca3af;
            margin-top: 1rem;
        }
        .footer-note {
            text-align: center;
            font-size: 0.7rem;
            color: #565a7a;
            margin-top: 1rem;
        }
        .example-prompts {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }
        .example-prompt {
            background: #1e1f2e;
            padding: 0.3rem 0.8rem;
            border-radius: 2rem;
            font-size: 0.7rem;
            cursor: pointer;
            transition: 0.2s;
            color: #a0a3c0;
        }
        .example-prompt:hover {
            background: #4285f4;
            color: white;
        }
        .copy-btn {
            background: #2a2d4a;
            border: none;
            padding: 0.3rem 0.8rem;
            border-radius: 1rem;
            color: white;
            cursor: pointer;
            font-size: 0.7rem;
            margin-left: 0.5rem;
            transition: 0.2s;
        }
        .copy-btn:hover {
            background: #4285f4;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>
        <span>🤖</span> Chat AI 1.0
    </h1>
    <div class="sub">Pilih model AI: Gemini, ChatGPT, atau Mistral. Tanyakan apa saja.</div>

    <div class="ai-selector">
        <div class="ai-option">
            <input type="radio" name="ai" id="gemini" value="gemini" checked>
            <label for="gemini">✨ Gemini (Google)</label>
        </div>
        <div class="ai-option">
            <input type="radio" name="ai" id="chatgpt" value="chatgpt">
            <label for="chatgpt">💬 ChatGPT (OpenAI)</label>
        </div>
        <div class="ai-option">
            <input type="radio" name="ai" id="mistral" value="mistral">
            <label for="mistral">🌀 Mistral AI</label>
        </div>
        <div class="ai-option">
            <input type="radio" name="ai" id="felo" value="felo">
            <label for="felo">🔍 Felo AI</label>
        </div>
        <div class="ai-option">
            <input type="radio" name="ai" id="venice" value="venice">
            <label for="venice">🎨 Venice AI</label>
        </div>
    </div>

    <div class="input-group">
        <label>📝 Prompt / Pertanyaan Anda</label>
        <textarea id="promptInput" rows="3" placeholder="Contoh: Berikan 5 rekomendasi film horor terbaik..."></textarea>
        <div class="example-prompts">
            <span class="example-prompt" data-prompt="Buatkan pantun lucu tentang AI">🎭 Pantun lucu AI</span>
            <span class="example-prompt" data-prompt="Jelaskan teori relativitas Einstein dengan bahasa sederhana">⚡ Teori relativitas</span>
            <span class="example-prompt" data-prompt="Resep nasi goreng spesial">🍳 Resep nasi goreng</span>
            <span class="example-prompt" data-prompt="Puisi tentang senja dan harapan">🌅 Puisi senja</span>
        </div>
    </div>

    <button id="askBtn" class="btn">🚀 Kirim Pertanyaan</button>
    <div id="keyStatus" class="key-status">🔑 Memuat kunci API...</div>

    <div id="resultContainer" class="result-area" style="display: none;">
        <div class="result-header">
            <span>📌 Jawaban AI</span>
            <span id="aiName"></span>
            <button id="copyResultBtn" class="copy-btn" style="display: none;">📋 Salin</button>
        </div>
        <div id="resultContent" class="result-content"></div>
    </div>

    <div class="footer-note">
        ⚡ Chat AI | Jika gagal silahkan kirim pertanyaan ulang
    </div>
</div>

<script>
    // ========== KUNCI API (sudah diisi) ==========
    const API_KEY = "fdv_3gyINhlUwmujagb29NEuYg";
    
    // Konfigurasi endpoint API (semua menggunakan POST dengan JSON)
    const AI_ENDPOINTS = {
        gemini: "https://api.ferdev.my.id/ai/gemini",
        chatgpt: "https://api.ferdev.my.id/ai/chatgpt",
        mistral: "https://api.ferdev.my.id/ai/mistral",
        felo: "https://api.ferdev.my.id/ai/felo",
        venice: "https://api.ferdev.my.id/ai/venice"
    };

    // DOM elements
    const askBtn = document.getElementById('askBtn');
    const promptInput = document.getElementById('promptInput');
    const resultContainer = document.getElementById('resultContainer');
    const resultContent = document.getElementById('resultContent');
    const aiNameSpan = document.getElementById('aiName');
    const keyStatusDiv = document.getElementById('keyStatus');
    const copyResultBtn = document.getElementById('copyResultBtn');

    // Status kunci
    if (API_KEY && API_KEY.length > 0) {
        keyStatusDiv.innerHTML = '✅ Apikey Aktif';
        askBtn.disabled = false;
    } else {
        keyStatusDiv.innerHTML = '❌ Apikey Non Aktif. Silakan hubungi author';
        askBtn.disabled = true;
    }

    // Event listener untuk contoh prompt
    document.querySelectorAll('.example-prompt').forEach(el => {
        el.addEventListener('click', () => {
            promptInput.value = el.getAttribute('data-prompt');
        });
    });

    function getSelectedAI() {
        const radios = document.querySelectorAll('input[name="ai"]');
        for (let radio of radios) {
            if (radio.checked) return radio.value;
        }
        return 'gemini';
    }

    let isRequesting = false;
    function showLoading() {
        isRequesting = true;
        askBtn.disabled = true;
        resultContainer.style.display = 'block';
        resultContent.innerHTML = '<div class="loading"><span>⏳</span> AI sedang berpikir...</div>';
        aiNameSpan.innerText = getSelectedAI().toUpperCase();
        copyResultBtn.style.display = 'none';
    }

    function hideLoading() {
        isRequesting = false;
        if (API_KEY && API_KEY.length > 0) {
            askBtn.disabled = false;
        }
    }

    function showError(message) {
        hideLoading();
        resultContainer.style.display = 'block';
        resultContent.innerHTML = `<div class="error">⚠️ ${escapeHtml(message)}</div>`;
        copyResultBtn.style.display = 'none';
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function convertMarkdownToHtml(md) {
        if (!md) return '';
        let html = escapeHtml(md);
        html = html.replace(/^### (.*?)$/gm, '<h3>$1</h3>');
        html = html.replace(/^## (.*?)$/gm, '<h2>$1</h2>');
        html = html.replace(/^# (.*?)$/gm, '<h1>$1</h1>');
        html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        html = html.replace(/__(.*?)__/g, '<strong>$1</strong>');
        html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
        html = html.replace(/_(.*?)_/g, '<em>$1</em>');
        html = html.replace(/~~(.*?)~~/g, '<del>$1</del>');
        html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
        html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1" style="max-width:100%; border-radius:0.5rem;">');
        html = html.replace(/^---$/gm, '<hr>');
        html = html.replace(/^> (.*?)$/gm, '<blockquote>$1</blockquote>');
        html = html.replace(/<\/blockquote>\n<blockquote>/g, '<br>');

        let lines = html.split('\n');
        let inUl = false, inOl = false;
        let processedLines = [];
        for (let i = 0; i < lines.length; i++) {
            let line = lines[i];
            if (line.match(/^\s*[\*\-]\s+(.*)/)) {
                let content = line.replace(/^\s*[\*\-]\s+(.*)/, '$1');
                if (!inUl) { processedLines.push('<ul>'); inUl = true; }
                processedLines.push(`<li>${content}</li>`);
                continue;
            } else if (line.match(/^\s*\d+\.\s+(.*)/)) {
                let content = line.replace(/^\s*\d+\.\s+(.*)/, '$1');
                if (!inOl) { processedLines.push('<ol>'); inOl = true; }
                processedLines.push(`<li>${content}</li>`);
                continue;
            } else {
                if (inUl) { processedLines.push('</ul>'); inUl = false; }
                if (inOl) { processedLines.push('</ol>'); inOl = false; }
                processedLines.push(line);
            }
        }
        if (inUl) processedLines.push('</ul>');
        if (inOl) processedLines.push('</ol>');
        html = processedLines.join('\n');

        let blocks = html.split(/\n\s*\n/);
        let resultBlocks = [];
        for (let block of blocks) {
            block = block.trim();
            if (block === '') continue;
            if (block.startsWith('<') && !block.startsWith('<p>')) {
                resultBlocks.push(block);
            } else {
                block = block.replace(/\n/g, '<br>');
                resultBlocks.push(`<p>${block}</p>`);
            }
        }
        html = resultBlocks.join('\n');
        html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
        html = html.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
        return html;
    }

    function showResult(message, aiName) {
        hideLoading();
        resultContainer.style.display = 'block';
        aiNameSpan.innerText = aiName.toUpperCase();
        resultContent.innerHTML = convertMarkdownToHtml(message);
        copyResultBtn.style.display = 'inline-block';
    }

    function copyResult() {
        const text = resultContent.innerText || resultContent.textContent;
        if (text) {
            navigator.clipboard.writeText(text).then(() => {
                const originalText = copyResultBtn.innerHTML;
                copyResultBtn.innerHTML = '✅ Tersalin!';
                setTimeout(() => { copyResultBtn.innerHTML = originalText; }, 2000);
            }).catch(() => alert('Gagal menyalin teks'));
        }
    }
    copyResultBtn.addEventListener('click', copyResult);

    // ========== PERBAIKAN: Kirim apikey sebagai HEADER Authorization Bearer ==========
    async function askAI() {
        if (isRequesting) return;
        const prompt = promptInput.value.trim();
        if (!prompt) {
            alert('Masukkan prompt terlebih dahulu!');
            return;
        }
        const selectedAI = getSelectedAI();
        const endpoint = AI_ENDPOINTS[selectedAI];
        if (!endpoint) {
            showError('Model AI tidak dikenal.');
            return;
        }
        if (!API_KEY) {
            showError('API Key tidak tersedia.');
            return;
        }

        showLoading();

        // Body hanya berisi prompt
        const requestBody = {
            prompt: prompt
        };

        console.log(`POST ke ${endpoint} dengan header Authorization: Bearer ${API_KEY.substring(0,10)}...`);

        try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 60000);

            const response = await fetch(endpoint, {
                method: 'POST',
                headers: {
                    'Accept': 'application/json',
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${API_KEY}`   // <--- INI PERUBAHAN UTAMA
                },
                body: JSON.stringify(requestBody),
                signal: controller.signal
            });

            clearTimeout(timeoutId);

            if (!response.ok) {
                let errorText = `HTTP ${response.status} ${response.statusText}`;
                const contentType = response.headers.get('content-type');
                if (contentType && contentType.includes('application/json')) {
                    try {
                        const errorJson = await response.json();
                        errorText = errorJson.message || errorJson.error || errorText;
                    } catch(e) {}
                } else {
                    const textBody = await response.text();
                    if (textBody) errorText = textBody.substring(0, 200);
                }
                throw new Error(errorText);
            }

            let json;
            try {
                json = await response.json();
            } catch(e) {
                throw new Error('Respons server bukan format JSON yang valid.');
            }

            console.log("Response dari server:", json);

            // Coba ekstrak pesan dari berbagai kemungkinan struktur
            let aiMessage = null;
            
            if (json.success === true) {
                aiMessage = json.message || json.result || json.response || json.text || json.content;
            } 
            else if (json.message) {
                aiMessage = json.message;
            }
            else if (json.result) {
                aiMessage = json.result;
            }
            else if (json.response) {
                aiMessage = json.response;
            }
            else if (typeof json === 'object' && !Array.isArray(json)) {
                const firstValue = Object.values(json).find(v => typeof v === 'string' && v.length > 0);
                if (firstValue) aiMessage = firstValue;
            }
            
            if (!aiMessage && typeof json === 'string') {
                aiMessage = json;
            }

            if (!aiMessage || aiMessage.trim() === '') {
                const serverError = json.message || json.error || json.msg;
                if (serverError) {
                    throw new Error(serverError);
                }
                throw new Error('Respons AI kosong atau tidak dikenali.');
            }

            showResult(aiMessage, selectedAI);

        } catch (error) {
            console.error("Error detail:", error);
            let userMessage = error.message;
            if (error.name === 'AbortError') {
                userMessage = '⏱️ Waktu habis (60 detik). Coba lagi nanti.';
            } else if (userMessage.includes('Failed to fetch')) {
                userMessage = '🌐 Gagal terhubung ke server AI. Periksa koneksi internet atau CORS.';
            } else if (userMessage.includes('format JSON')) {
                userMessage = '⚠️ Server mengembalikan data tidak valid. Coba lagi.';
            } else if (userMessage.toLowerCase().includes('unauthorized') || userMessage.toLowerCase().includes('bearer')) {
                userMessage = '🔑 Autentikasi gagal. Periksa kembali API Key (Bearer token) Anda.';
            }
            showError(userMessage);
        }
    }

    askBtn.addEventListener('click', askAI);
    promptInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
            e.preventDefault();
            askAI();
        }
    });
</script>
</body>
</html>
