<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Password Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Inter', 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0b1120 0%, #111827 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }

        /* Container utama */
        .generator-card {
            max-width: 620px;
            width: 100%;
            background: rgba(18, 25, 40, 0.85);
            backdrop-filter: blur(2px);
            border-radius: 2.5rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.05);
            overflow: hidden;
            transition: all 0.2s ease;
        }

        /* Header */
        .header {
            background: rgba(15, 23, 42, 0.7);
            padding: 1.5rem 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #E0E7FF, #A5B4FC);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .header h1::before {
            content: "🔐";
            font-size: 1.8rem;
            background: none;
            -webkit-background-clip: unset;
            color: #c084fc;
        }

        .sub {
            color: #94a3b8;
            font-size: 0.85rem;
            margin-top: 0.4rem;
            font-weight: 500;
        }

        /* Area tampilan password */
        .password-area {
            padding: 1.8rem 2rem 0.8rem 2rem;
        }

        .password-wrapper {
            background: #0f172a;
            border-radius: 1.8rem;
            padding: 0.2rem;
            border: 1px solid #334155;
            transition: 0.2s;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .password-wrapper:focus-within {
            border-color: #8b5cf6;
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.3);
        }

        .password-field {
            display: flex;
            align-items: center;
            background: #0a0f1c;
            border-radius: 1.8rem;
            padding: 0.2rem 0.2rem 0.2rem 1.2rem;
        }

        #passwordOutput {
            flex: 1;
            background: transparent;
            border: none;
            font-size: 1.35rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            color: #f1f5f9;
            padding: 1rem 0;
            font-family: 'SF Mono', 'Fira Code', monospace;
            outline: none;
        }

        .copy-btn {
            background: #1e293b;
            border: none;
            color: #cbd5e1;
            font-size: 1.4rem;
            cursor: pointer;
            padding: 0.7rem 1.2rem;
            border-radius: 2rem;
            margin: 0.3rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
        }

        .copy-btn:hover {
            background: #2d3a54;
            color: white;
            transform: scale(0.97);
        }

        /* Strength indicator */
        .strength-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1rem;
            padding: 0 0.3rem;
        }

        .strength-text {
            font-size: 0.8rem;
            font-weight: 600;
            color: #94a3b8;
        }

        .strength-bar {
            width: 160px;
            height: 6px;
            background: #1e293b;
            border-radius: 4px;
            overflow: hidden;
        }

        .strength-fill {
            width: 0%;
            height: 100%;
            transition: width 0.2s ease, background 0.2s;
        }

        /* Kontrol panel */
        .control-panel {
            padding: 1rem 2rem 2rem 2rem;
        }

        /* Slider jumlah password */
        .pass-count-section {
            background: #0f172a;
            border-radius: 1.2rem;
            padding: 1rem 1.2rem;
            margin-bottom: 1.6rem;
            border: 1px solid #1e293b;
        }

        .slider-label {
            display: flex;
            justify-content: space-between;
            font-weight: 600;
            color: #e2e8f0;
            margin-bottom: 0.6rem;
        }

        input[type="range"] {
            width: 100%;
            height: 5px;
            -webkit-appearance: none;
            background: #1e293b;
            border-radius: 5px;
            outline: none;
        }

        input[type="range"]:focus {
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: #a78bfa;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 5px #a78bfa;
            border: none;
        }

        #passCountValue {
            background: #1e293b;
            padding: 0.2rem 0.8rem;
            border-radius: 2rem;
            font-size: 0.9rem;
            font-weight: 600;
            color: #c4b5fd;
        }

        /* Panjang password */
        .length-control {
            margin-bottom: 1.6rem;
            background: #0f172a;
            border-radius: 1.2rem;
            padding: 1rem 1.2rem;
            border: 1px solid #1e293b;
        }

        .length-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.6rem;
        }

        #lengthValue {
            background: #1e293b;
            padding: 0.2rem 0.8rem;
            border-radius: 2rem;
            font-weight: 700;
            color: #c084fc;
        }

        /* Checkbox group */
        .charset-grid {
            background: #0f172a;
            border-radius: 1.2rem;
            padding: 1rem 1.2rem;
            margin-bottom: 1.8rem;
            border: 1px solid #1e293b;
        }

        .grid-title {
            font-weight: 600;
            color: #cbd5e6;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 1.2rem;
            row-gap: 0.8rem;
        }

        .checkbox-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #1e293b;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            cursor: pointer;
            transition: 0.1s;
            font-weight: 500;
            color: #e2e8f0;
        }

        .checkbox-group input {
            width: 18px;
            height: 18px;
            accent-color: #8b5cf6;
            cursor: pointer;
        }

        /* Tombol generate */
        .generate-btn {
            width: 100%;
            background: linear-gradient(95deg, #7c3aed, #a855f7);
            border: none;
            padding: 1rem;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 2rem;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 0.5rem;
            box-shadow: 0 5px 12px rgba(124, 58, 237, 0.3);
        }

        .generate-btn:hover {
            transform: translateY(-2px);
            background: linear-gradient(95deg, #8b5cf6, #c084fc);
            box-shadow: 0 12px 20px -8px #7c3aed80;
        }

        /* Daftar password multi */
        .multi-pass-list {
            padding: 0 2rem 1.8rem 2rem;
            border-top: 1px solid rgba(71, 85, 105, 0.5);
            margin-top: 0.5rem;
        }

        .multi-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin: 1rem 0 0.8rem 0;
        }

        .multi-header span {
            font-weight: 600;
            color: #a5b4fc;
            font-size: 0.85rem;
        }

        .passwords-container {
            max-height: 260px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.7rem;
            padding-right: 0.3rem;
        }

        .password-item {
            background: #0f172a;
            border-radius: 1rem;
            padding: 0.6rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #2d3a4e;
            transition: 0.1s;
        }

        .password-item span {
            font-family: monospace;
            font-size: 0.9rem;
            font-weight: 500;
            color: #e2e8f0;
            letter-spacing: 0.3px;
            word-break: break-all;
        }

        .copy-mini {
            background: #1e293b;
            border: none;
            padding: 5px 12px;
            border-radius: 2rem;
            font-size: 0.7rem;
            font-weight: 600;
            color: #cbd5e1;
            cursor: pointer;
            transition: 0.1s;
        }

        .copy-mini:hover {
            background: #8b5cf6;
            color: white;
        }

        footer {
            font-size: 0.7rem;
            text-align: center;
            padding: 1rem 1rem 1.2rem;
            color: #4b5563;
            border-top: 1px solid #1e2a3a;
        }

        @media (max-width: 500px) {
            .generator-card {
                border-radius: 1.5rem;
            }
            .password-field {
                flex-wrap: wrap;
            }
            .copy-btn {
                padding: 0.5rem 1rem;
                font-size: 0.9rem;
            }
            #passwordOutput {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

<div class="generator-card">
    <div class="header">
        <h1>Password Generator</h1>
        <div class="sub">Sesuaikan karakter & jumlah password ⚡</div>
    </div>

    <div class="password-area">
        <div class="password-wrapper">
            <div class="password-field">
                <input type="text" id="passwordOutput" readonly placeholder="Klik Generate atau atur opsi" value="Klik Generate">
                <button class="copy-btn" id="copyMainBtn">📋 Salin</button>
            </div>
        </div>
        <div class="strength-area">
            <div class="strength-text" id="strengthLabel">Kekuatan: —</div>
            <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
        </div>
    </div>

    <div class="control-panel">
        <!-- Jumlah Password yang akan ditampilkan (multi password) -->
        <div class="pass-count-section">
            <div class="slider-label">
                <span>📑 Jumlah Password</span>
                <span id="passCountValue">1</span>
            </div>
            <input type="range" id="passwordCountSlider" min="1" max="12" value="1" step="1">
        </div>

        <!-- Panjang Password -->
        <div class="length-control">
            <div class="length-header">
                <span>🔢 Panjang Karakter</span>
                <span id="lengthValue">12</span>
            </div>
            <input type="range" id="lengthSlider" min="4" max="32" value="12" step="1">
        </div>

        <!-- Karakter Set -->
        <div class="charset-grid">
            <div class="grid-title">🔤 Karakter yang diizinkan</div>
            <div class="checkbox-group">
                <label><input type="checkbox" id="includeUpper" checked> ABC (huruf besar)</label>
                <label><input type="checkbox" id="includeLower" checked> abc (huruf kecil)</label>
                <label><input type="checkbox" id="includeNumbers" checked> 123 (angka)</label>
                <label><input type="checkbox" id="includeSymbols" checked> #$& (simbol)</label>
            </div>
        </div>

        <button class="generate-btn" id="generateBtn">✨ Generate Password ✨</button>
    </div>

    <!-- Daftar multiple password (jika jumlah > 1) -->
    <div class="multi-pass-list" id="multiPassSection" style="display: none;">
        <div class="multi-header">
            <span>📋 Daftar Password Ter-generate</span>
            <span style="font-size: 0.7rem;" id="multiInfo"></span>
        </div>
        <div id="passwordsList" class="passwords-container"></div>
    </div>
    <footer>🔒 Generator aman — semua proses di lokal browser</footer>
</div>

<script>
    // DOM Elements
    const passwordOutput = document.getElementById('passwordOutput');
    const lengthSlider = document.getElementById('lengthSlider');
    const lengthValue = document.getElementById('lengthValue');
    const includeUpper = document.getElementById('includeUpper');
    const includeLower = document.getElementById('includeLower');
    const includeNumbers = document.getElementById('includeNumbers');
    const includeSymbols = document.getElementById('includeSymbols');
    const generateBtn = document.getElementById('generateBtn');
    const copyMainBtn = document.getElementById('copyMainBtn');
    const passwordCountSlider = document.getElementById('passwordCountSlider');
    const passCountValue = document.getElementById('passCountValue');
    const multiPassSection = document.getElementById('multiPassSection');
    const passwordsListDiv = document.getElementById('passwordsList');
    const strengthFill = document.getElementById('strengthFill');
    const strengthLabel = document.getElementById('strengthLabel');

    // Karakter pool
    const UPPER = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    const LOWER = "abcdefghijklmnopqrstuvwxyz";
    const NUMBERS = "0123456789";
    const SYMBOLS = "#$&@={}_()[]";   // sesuai permintaan: # $ & saja, tapi juga bisa ditambah agar variatif? tetap pakai #$&

    // Fungsi mendapatkan karakter yang aktif
    function getActiveCharset() {
        let chars = "";
        if (includeUpper.checked) chars += UPPER;
        if (includeLower.checked) chars += LOWER;
        if (includeNumbers.checked) chars += NUMBERS;
        if (includeSymbols.checked) chars += SYMBOLS;
        return chars;
    }

    // Validasi set karakter tidak kosong
    function validateCharset(charset) {
        if (charset.length === 0) {
            alert("⚠️ Pilih setidaknya satu tipe karakter (ABC, abc, 123, atau #$&)");
            return false;
        }
        return true;
    }

    // Fungsi random integer
    function getRandomInt(max) {
        return Math.floor(Math.random() * max);
    }

    // Generate satu password berdasarkan panjang & karakter set
    function generateSinglePassword(length, charset) {
        let password = "";
        const charLen = charset.length;
        for (let i = 0; i < length; i++) {
            const randomIndex = getRandomInt(charLen);
            password += charset[randomIndex];
        }
        return password;
    }

    // Estimasi kekuatan password berdasarkan jenis karakter dan panjang
    function updateStrengthIndicator(password, charsetUsed) {
        let strength = 0;
        const len = password.length;
        let variety = 0;
        if (includeUpper.checked && /[A-Z]/.test(password)) variety++;
        if (includeLower.checked && /[a-z]/.test(password)) variety++;
        if (includeNumbers.checked && /[0-9]/.test(password)) variety++;
        if (includeSymbols.checked && /[#$&]/.test(password)) variety++;
        
        // Skor dasar: panjang + variasi
        let rawScore = len * 2 + (variety * 8);
        if (len >= 12 && variety >= 3) rawScore += 20;
        if (len >= 8 && variety >= 2) rawScore += 10;
        
        let widthPercent = 0;
        let textStatus = "";
        if (rawScore < 25) { widthPercent = 25; textStatus = "Lemah"; strengthFill.style.background = "#ef4444"; }
        else if (rawScore < 50) { widthPercent = 50; textStatus = "Cukup"; strengthFill.style.background = "#f97316"; }
        else if (rawScore < 75) { widthPercent = 75; textStatus = "Kuat"; strengthFill.style.background = "#eab308"; }
        else { widthPercent = 100; textStatus = "Sangat Kuat"; strengthFill.style.background = "#22c55e"; }
        
        strengthFill.style.width = `${widthPercent}%`;
        strengthLabel.innerText = `Kekuatan: ${textStatus} (${len} karakter, ${variety} varian)`;
    }

    // Generate multiple password sesuai jumlah dan panjang
    function generateMultiplePasswords(count, length, charset) {
        const passwords = [];
        for (let i = 0; i < count; i++) {
            passwords.push(generateSinglePassword(length, charset));
        }
        return passwords;
    }

    // Render daftar password (multi)
    function renderPasswordList(passwords) {
        if (!passwordsListDiv) return;
        passwordsListDiv.innerHTML = "";
        if (!passwords || passwords.length === 0) return;
        
        passwords.forEach((pwd, idx) => {
            const itemDiv = document.createElement('div');
            itemDiv.className = 'password-item';
            const span = document.createElement('span');
            span.textContent = pwd;
            const copyBtn = document.createElement('button');
            copyBtn.textContent = 'Salin';
            copyBtn.className = 'copy-mini';
            copyBtn.setAttribute('data-pwd', pwd);
            copyBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                copyToClipboard(pwd);
                // feedback sederhana
                const originalText = copyBtn.textContent;
                copyBtn.textContent = 'Tersalin!';
                setTimeout(() => { copyBtn.textContent = originalText; }, 1000);
            });
            itemDiv.appendChild(span);
            itemDiv.appendChild(copyBtn);
            passwordsListDiv.appendChild(itemDiv);
        });
    }

    // Fungsi global untuk generate dan update seluruh UI (utama & list)
    function generateAndDisplay() {
        let charset = getActiveCharset();
        if (!validateCharset(charset)) return;
        
        const passwordLength = parseInt(lengthSlider.value, 10);
        const passCount = parseInt(passwordCountSlider.value, 10);
        
        // generate semua password
        const allPasswords = generateMultiplePasswords(passCount, passwordLength, charset);
        if (allPasswords.length === 0) return;
        
        // Tampilkan password pertama di input utama
        const mainPassword = allPasswords[0];
        passwordOutput.value = mainPassword;
        updateStrengthIndicator(mainPassword, charset);
        
        // Jika jumlah password > 1 tampilkan multi list, jika tidak sembunyikan
        if (passCount > 1) {
            multiPassSection.style.display = "block";
            const multiInfoSpan = document.getElementById('multiInfo');
            if (multiInfoSpan) multiInfoSpan.innerText = `${passCount} password · panjang ${passwordLength}`;
            renderPasswordList(allPasswords);
        } else {
            multiPassSection.style.display = "none";
            passwordsListDiv.innerHTML = "";
        }
    }

    // Salin teks ke clipboard
    async function copyToClipboard(text) {
        if (!text || text === "Klik Generate") {
            alert("Tidak ada password untuk disalin, generate terlebih dahulu!");
            return false;
        }
        try {
            await navigator.clipboard.writeText(text);
            return true;
        } catch (err) {
            // fallback
            const textarea = document.createElement('textarea');
            textarea.value = text;
            document.body.appendChild(textarea);
            textarea.select();
            const success = document.execCommand('copy');
            document.body.removeChild(textarea);
            if (success) return true;
            alert("Gagal menyalin, izinkan clipboard.");
            return false;
        }
    }

    // Event untuk tombol copy utama
    copyMainBtn.addEventListener('click', async () => {
        const pwd = passwordOutput.value;
        if (!pwd || pwd === "Klik Generate") {
            alert("Belum ada password. Klik Generate terlebih dahulu.");
            return;
        }
        const ok = await copyToClipboard(pwd);
        if (ok) {
            const original = copyMainBtn.innerHTML;
            copyMainBtn.innerHTML = "✅ Tersalin!";
            setTimeout(() => { copyMainBtn.innerHTML = original; }, 1500);
        }
    });

    // Event listeners
    generateBtn.addEventListener('click', () => {
        generateAndDisplay();
    });

    // Update tampilan panjang & jumlah password, lalu generate otomatis? biar user nyaman: ketika slider berubah langsung generate ulang (opsi realtime)
    // Untuk UX, kita buat realtime pada slider panjang dan jumlah dan karakter juga generate ulang (opsional)
    function autoGenerate() {
        // Cegah jika charset kosong tapi kita tetap validasi tapi jangan sampai popup terus, hanya generate jika charset tidak kosong
        let charset = getActiveCharset();
        if (charset.length === 0) {
            // tapi user mungkin tidak pilih apapun, kita beri peringatan tapi jangan ganggu terus, tetap tampilkan pesan di password
            passwordOutput.value = "⚠️ Pilih jenis karakter!";
            strengthFill.style.width = "0%";
            strengthLabel.innerText = "Kekuatan: tidak valid";
            multiPassSection.style.display = "none";
            return;
        }
        generateAndDisplay();
    }
    
    // Event untuk slider panjang
    lengthSlider.addEventListener('input', (e) => {
        lengthValue.innerText = e.target.value;
        autoGenerate();
    });
    passwordCountSlider.addEventListener('input', (e) => {
        passCountValue.innerText = e.target.value;
        autoGenerate();
    });
    
    // Event untuk checkbox: generate ulang
    includeUpper.addEventListener('change', autoGenerate);
    includeLower.addEventListener('change', autoGenerate);
    includeNumbers.addEventListener('change', autoGenerate);
    includeSymbols.addEventListener('change', autoGenerate);
    
    // Inisialisasi awal
    function init() {
        lengthSlider.value = 12;
        lengthValue.innerText = "12";
        passwordCountSlider.value = 1;
        passCountValue.innerText = "1";
        includeUpper.checked = true;
        includeLower.checked = true;
        includeNumbers.checked = true;
        includeSymbols.checked = true;
        multiPassSection.style.display = "none";
        autoGenerate(); // generate password default
    }
    
    init();
</script>
</body>
</html>
